<!-- ============================================================
     WIDGET DE ATENDIMENTO — colar este bloco INTEIRO no index
     do site, logo antes de </body>. Não precisa de mais nada.

     Pra trocar o agente/ramo: mude o parâmetro `agente=` na URL
     dentro de data-chat-url (ex.: agente=corretor_imoveis).
     ============================================================ -->
<div id="ah-chat-widget" data-chat-url="https://agentes-s68ksrzb97z5q4qqp7f8nq.streamlit.app/?agente=atendimento&embed=true"></div>
<script>
(function () {
  var root = document.getElementById('ah-chat-widget');
  var chatUrl = root.getAttribute('data-chat-url');

  var style = document.createElement('style');
  style.textContent =
    '#ah-chat-btn{position:fixed;right:24px;bottom:24px;width:60px;height:60px;' +
    'border-radius:50%;border:0;cursor:pointer;background:#16a34a;' +
    'box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:99999;display:flex;' +
    'align-items:center;justify-content:center;transition:transform .15s}' +
    '#ah-chat-btn:hover{transform:scale(1.06)}' +
    '#ah-chat-btn svg{width:28px;height:28px;stroke:#fff;fill:none;' +
    'stroke-width:2;stroke-linecap:round;stroke-linejoin:round}' +
    '#ah-chat-box{position:fixed;right:24px;bottom:96px;width:380px;height:560px;' +
    'border:1px solid #ddd;border-radius:16px;overflow:hidden;display:none;' +
    'box-shadow:0 12px 40px rgba(0,0,0,.25);background:#fff;z-index:99999}' +
    '#ah-chat-box.aberto{display:block}' +
    '#ah-chat-box iframe{width:100%;height:100%;border:0}' +
    '@media (max-width:480px){#ah-chat-box{right:8px;left:8px;width:auto;height:70vh}}';
  document.head.appendChild(style);

  var btn = document.createElement('button');
  btn.id = 'ah-chat-btn';
  btn.setAttribute('aria-label', 'Falar com o atendimento');
  var iconChat = '<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';
  var iconClose = '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  btn.innerHTML = iconChat;

  var box = document.createElement('div');
  box.id = 'ah-chat-box';
  var carregado = false;

  btn.addEventListener('click', function () {
    // iframe só carrega no 1º clique — não pesa o carregamento do site
    if (!carregado) {
      var frame = document.createElement('iframe');
      frame.src = chatUrl;
      frame.title = 'Assistente de atendimento';
      box.appendChild(frame);
      carregado = true;
    }
    box.classList.toggle('aberto');
    btn.innerHTML = box.classList.contains('aberto') ? iconClose : iconChat;
  });

  document.body.appendChild(box);
  document.body.appendChild(btn);
})();
</script>
<!-- ============================ fim do widget ============================ -->
